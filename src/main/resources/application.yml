server:
  port: 8084

spring:
  application:
    name: ms-asistencia

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/db_asistencia?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=America/Santiago}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html