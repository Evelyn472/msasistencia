server:
  port: 8084

spring:
  application:
    name: ms-asistencia

  datasource:
    url: jdbc:mysql://localhost:3306/db_asistencia?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=America/Santiago
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html